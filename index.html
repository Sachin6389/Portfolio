<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Mobile Responsive -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <!-- Primary SEO -->
    <title>
      Sachin Gond | Full Stack Developer | AI/ML Engineer | SEO Specialist
    </title>

    <meta
      name="description"
      content="Sachin Gond is a Full Stack Developer specializing in MERN Stack, SEO, Google Ads, Data Science, Machine Learning, Generative AI, LLMs, and RAG Applications. Explore projects, skills, and experience."
    />

    <meta
      name="keywords"
      content="Sachin Gond, Full Stack Developer, MERN Stack Developer, React Developer, Node.js Developer, SEO Expert, Google Ads Specialist, Data Science, Machine Learning, AI Engineer, Generative AI, LLM, RAG, LangChain, Portfolio"
    />

    <meta name="author" content="Sachin Gond" />

    <!-- Search Engine -->
    <meta name="robots" content="index, follow" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#0f172a" />

    <!-- Open Graph -->
    <meta
      property="og:title"
      content="Sachin Gond | Full Stack Developer & AI Engineer"
    />

    <meta
      property="og:description"
      content="Portfolio of Sachin Gond showcasing Full Stack Development, SEO, Google Ads, Data Science, Machine Learning, Generative AI, LLMs, and RAG Applications."
    />

    <meta property="og:type" content="website" />

    <meta
      property="og:image"
      content="/logo.png"
    />

    <meta
      property="og:url"
      content="https://your-portfolio-domain.com"
    />

    <!-- Twitter Card -->
    <meta
      name="twitter:card"
      content="summary_large_image"
    />

    <meta
      name="twitter:title"
      content="Sachin Gond | Full Stack Developer & AI Engineer"
    />

    <meta
      name="twitter:description"
      content="Full Stack Developer, SEO Specialist, Data Science & AI Enthusiast."
    />

    <meta
      name="twitter:image"
      content="/logo.png"
    />

    <!-- Canonical URL -->
    <link
      rel="canonical"
      href="https://your-portfolio-domain.com"
    />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo.png" />

    <!-- Google Fonts (Optional) -->
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
